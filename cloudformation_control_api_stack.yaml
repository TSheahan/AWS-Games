AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Minimal Lambda + Function URL control API for game server start/stop.
  Intended for invocation from mobile home screen shortcuts.
  Survives game server stack reinstalls — deploy and update in place; do not delete.

Metadata:
  RegionalWorkaround: |
    THIS STACK DEPLOYS TO ap-southeast-2 (Sydney), NOT ap-southeast-4 (Melbourne).

    Reason: AWS::Lambda::Url is not available in ap-southeast-4 (as of 2026-03).
    Sydney is an older region with full Lambda Function URL support.

    Cross-region operation: the Lambda function is hosted in Sydney but its boto3
    clients target ap-southeast-4 explicitly (REGION constant in the function code).
    EC2 start/stop and CloudFormation stack lookup both operate against Melbourne.
    Cross-region API calls are standard AWS behaviour — no special configuration needed.

    Migration path back to Melbourne: when AWS::Lambda::Url becomes available in
    ap-southeast-4, change REGION in deploy_control_api.py to ap-southeast-4 and
    redeploy. The Lambda code requires no changes (it already targets ap-southeast-4
    for its EC2 and CF clients). Delete the Sydney stack after confirming the Melbourne
    stack is healthy. Both ControlApiFunctionUrlPermission and
    ControlApiInvokeFunctionPermission must be present in the migrated template —
    the two-permission requirement (see below) applies in all regions.

    Two-permission requirement (October 2025 change): new Function URLs require both
    lambda:InvokeFunctionUrl AND lambda:InvokeFunction in the resource-based policy.
    This was the root cause of all 403 Forbidden failures observed during development
    across us-east-1, ap-southeast-2, and ap-southeast-4. Both permissions are present
    in this template.


  SecurityModel: |
    AUTH DESIGN — CAPABILITY URL PATTERN

    The API key is carried in the URL query string (?key=<value>) by deliberate design,
    not as a workaround forced by browser limitations. The bookmark IS the credential:
    tapping it authenticates and acts in a single gesture. This is the capability URL
    pattern — a URL that confers the right to perform an action by virtue of being
    possessed. The security model is "keep the URL secret" rather than "authenticate
    the caller."

    This choice is internally consistent with the UX requirement (one-tap home screen
    shortcut, no intermediate login step) and is appropriate given the threat model:
    personal device with screen lock, key scoped to instance start/stop only, no access
    to data or configuration.

    API Gateway's native API key management (AWS::ApiGateway::ApiKey + UsagePlan) solves
    a different problem: authenticating a known caller via a header that the gateway
    validates before Lambda is invoked. It is architecturally cleaner for server-to-server
    or app-to-API use cases, but it requires the key in the x-api-key header — which a
    browser navigating to a bookmarked URL cannot supply. It would eliminate the one-tap
    UX entirely. It is not a superior solution to this problem; it is a solution to a
    different problem.

    The "looser disclosure profile" accepted at design time reflects this scoping: the
    key's blast radius is bounded (start/stop only), the device context is personal, and
    the capability URL pattern is a legitimate, well-understood design within those bounds.

    Residual risks to be aware of:
    - URL appears in Chrome browser history on the device
    - Key is visible in Lambda console (environment variables) to anyone with AWS access
    If either concern increases in future, the migration path is: HTTP Request Shortcut
    app (Android) + API Gateway REST API + AWS::ApiGateway::ApiKey. That combination
    restores header-based auth and gateway-level key management without changing the
    Lambda code.

Parameters:
  ApiKey:
    Type: String
    NoEcho: true
    Description: >
      Secret key required in the ?key= query parameter on all requests.
      Scoped to game instance start/stop only — not a privileged credential.
      Changing this value and redeploying immediately revokes the old key.

Resources:

  ControlApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GameControlApiLambdaRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      # CloudWatch Logs only — no S3, no VPC, no X-Ray
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GameControlApiPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: FindGameStack
                Effect: Allow
                Action:
                  - cloudformation:ListStacks
                  - cloudformation:DescribeStackResource
                Resource: "*"
              - Sid: ControlGameInstance
                Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: "*"

  ControlApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GameControlApi
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ControlApiRole.Arn
      Timeout: 30
      Environment:
        Variables:
          API_KEY: !Ref ApiKey
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          REGION = "ap-southeast-4"
          STACK_PREFIX = "GameStack"
          ACTIVE_STATES = {"CREATE_COMPLETE", "UPDATE_COMPLETE"}


          def find_active_stack(cf):
              """Return the name of the single active GameStack, or raise if 0 or >1."""
              paginator = cf.get_paginator("list_stacks")
              matching = []
              for page in paginator.paginate(StackStatusFilter=list(ACTIVE_STATES)):
                  for stack in page.get("StackSummaries", []):
                      if stack["StackName"].startswith(STACK_PREFIX):
                          matching.append(stack["StackName"])
              if len(matching) != 1:
                  raise RuntimeError(
                      f"Expected 1 active GameStack, found {len(matching)}: {matching}"
                  )
              return matching[0]


          def get_instance_id(cf, stack_name):
              """Resolve the EC2 instance ID from the CloudFormation stack resource."""
              response = cf.describe_stack_resource(
                  StackName=stack_name,
                  LogicalResourceId="ServerInstance",
              )
              return response["StackResourceDetail"]["PhysicalResourceId"]


          def handler(event, context):
              api_key = os.environ["API_KEY"]
              params = event.get("queryStringParameters") or {}

              # Validate API key before doing anything else
              if params.get("key") != api_key:
                  return {
                      "statusCode": 403,
                      "headers": {"Content-Type": "application/json"},
                      "body": json.dumps({"error": "forbidden"}),
                  }

              action = params.get("action", "").lower()
              if action not in ("start", "stop"):
                  return {
                      "statusCode": 400,
                      "headers": {"Content-Type": "application/json"},
                      "body": json.dumps({"error": "action must be 'start' or 'stop'"}),
                  }

              cf = boto3.client("cloudformation", region_name=REGION)
              ec2 = boto3.client("ec2", region_name=REGION)

              try:
                  stack_name = find_active_stack(cf)
                  instance_id = get_instance_id(cf, stack_name)

                  if action == "start":
                      result = ec2.start_instances(InstanceIds=[instance_id])
                      state = result["StartingInstances"][0]["CurrentState"]["Name"]
                  else:
                      result = ec2.stop_instances(InstanceIds=[instance_id])
                      state = result["StoppingInstances"][0]["CurrentState"]["Name"]

                  return {
                      "statusCode": 200,
                      "headers": {"Content-Type": "application/json"},
                      "body": json.dumps({
                          "action": action,
                          "instance_id": instance_id,
                          "state": state,
                      }),
                  }

              except Exception as e:
                  return {
                      "statusCode": 500,
                      "headers": {"Content-Type": "application/json"},
                      "body": json.dumps({"error": str(e)}),
                  }

  ControlApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref ControlApiFunction
      AuthType: NONE

  # Required to allow unauthenticated (key-gated) public invocation of the Function URL
  ControlApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ControlApiFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  # Required since October 2025: new Function URLs require lambda:InvokeFunction in
  # addition to lambda:InvokeFunctionUrl. Principal * is intentionally permissive —
  # the Lambda handler validates the API key on all invocation paths regardless.
  ControlApiInvokeFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ControlApiFunction
      Action: lambda:InvokeFunction
      Principal: "*"

Outputs:
  FunctionUrl:
    Description: >
      Base URL for the control API. Append ?action=start&key=<key> or
      ?action=stop&key=<key> to form the full shortcut URLs.
    Value: !GetAtt ControlApiFunctionUrl.FunctionUrl
