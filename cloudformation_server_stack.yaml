AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation Template for a hosted game server

Parameters:
  ServerPortNumberStart:
    Type: Number
    Description: First TCP port for game server traffic

  ServerPortNumberEnd:
    Type: Number
    Description: Last TCP port for game server traffic

  SetupCommand:
    Type: String
    Description: Defines the setup invocation. Permits code execution. Direct secrets prohibited.

  ExistingVolumeId:
    Type: String
    Description: ID of an existing EBS volume to attach. Leave empty to create a new volume.
    Default: ""

  InstanceType:
    Type: String
    Default: t4g.medium
    Description: |
      EC2 instance type.
      - Default t4g.medium: Graviton ARM, cost-effective, strong single-thread performance for chunk generation (2 vCPU burstable, 4GB RAM).
      - Use t4g.large for more RAM (8GB) with many players/mods.
      - Use m7g.medium (or larger) for sustained higher CPU (non-burstable baseline performance).

  AvailabilityZone:
    Type: String
    Default: ""
    Description: Availability Zone for the instance and new volume. Leave empty for automatic selection of first AZ. Needed when reusing an existing volume.

Conditions:
  CreateNewVolume: !Equals
    - !Ref ExistingVolumeId
    - ""
  HasAvailabilityZone: !Not
    - !Equals
      - !Ref AvailabilityZone
      - ""

Resources:
  ServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.12-arm64}}'  # AL2023 ARM64, kernel-6.12 LTS. Resolved dynamically at deploy time — no manual AMI maintenance. AL2023 EoL June 2029.
      KeyName: tim_ssh_to_game_server  # EC2 / key pairs
      SecurityGroupIds:
        - !Ref ServerSecurityGroup
      AvailabilityZone: !If
        - HasAvailabilityZone
        - !Ref AvailabilityZone
        - !Select
          - 0
          - !GetAZs
            Ref: AWS::Region
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash

            # Australia/Melbourne should be all that anyone will ever need... right?
            timedatectl set-timezone Australia/Melbourne

            echo "!! Detect and mount persistent volume"
            # Identify target volume by EBS volume ID encoded in the NVMe serial number.
            # TARGET_VOLUME is injected by CloudFormation at deploy time, eliminating heuristic
            # device selection. NVMe serials drop hyphens: vol-0abc123 becomes vol0abc123.
            TARGET_VOLUME="${TargetVolumeId}"
            echo "Target volume ID: $TARGET_VOLUME"

            REAL_DEVICE=""
            echo "Waiting for EBS volume $TARGET_VOLUME to appear (up to 120s)..."
            for i in {1..24}; do  # 24 * 5s = 120s timeout
                # awk BEGIN strips hyphen from vol variable before line matching
                REAL_DEVICE=$(lsblk -d -n -o NAME,SERIAL | awk -v vol="$TARGET_VOLUME" '
                  BEGIN { gsub(/-/, "", vol) }
                  $2 == vol { print "/dev/" $1 }
                ')
                if [ -n "$REAL_DEVICE" ]; then
                    echo "Detected target volume at $REAL_DEVICE"
                    break
                fi
                echo "Volume not yet visible... ($i/24). Current devices:"
                lsblk -d -n -o NAME,SERIAL,SIZE
                sleep 5
            done

            # Simplification candidate: remove this fallback if serial match (above) proves reliable across deploys
            if [ -z "$REAL_DEVICE" ]; then
                echo "WARNING: Serial-based volume detection timed out for $TARGET_VOLUME."
                echo "WARNING: Engaging root-exclusion fallback — device identity is less certain. Check serial match output above."
                echo "Device state at fallback entry:"
                lsblk -d -n -o NAME,SERIAL,SIZE

                # Identify the root disk by resolving the parent device of the / mountpoint.
                # findmnt gives the partition (/dev/nvme0n1p1); lsblk PKNAME strips the partition
                # suffix to yield the disk name (nvme0n1).
                ROOT_DISK=$(lsblk -n -o PKNAME "$(findmnt -n -o SOURCE /)")
                if [ -z "$ROOT_DISK" ]; then
                    echo "Error: Could not identify root disk for exclusion. Cannot safely select data volume."
                    echo "Diagnostic — findmnt / output:"
                    findmnt -n -o SOURCE /
                    echo "Diagnostic — full lsblk:"
                    lsblk
                    exit 1
                fi
                echo "Root disk identified as: /dev/$ROOT_DISK (excluded from candidate set)"

                # Select the first disk that is not the root disk
                REAL_DEVICE=$(lsblk -d -n -o NAME,TYPE | awk -v root="$ROOT_DISK" '$2 == "disk" && $1 != root { print "/dev/" $1 }' | head -1)
                if [ -z "$REAL_DEVICE" ]; then
                    echo "Error: Fallback also failed — no non-root disk found."
                    echo "Diagnostic — full lsblk:"
                    lsblk
                    exit 1
                fi
                echo "WARNING: Fallback selected: $REAL_DEVICE (serial match was inconclusive — verify this is the correct volume)"
            fi

            echo "Using device: $REAL_DEVICE"

            echo "!! Check if the volume needs formatting"
            if [ "$(file -s "$REAL_DEVICE" | awk '{print $2}')" == "data" ]; then
                echo "$REAL_DEVICE is not formatted, formatting as ext4..."
                mkfs -t ext4 "$REAL_DEVICE"
            else
                echo "$REAL_DEVICE is already formatted."
            fi

            echo "!! Mount the volume to /mnt/persist"
            mkdir -p /mnt/persist
            mount "$REAL_DEVICE" /mnt/persist
            if [ $? -ne 0 ]; then
                echo "Error: Failed to mount $REAL_DEVICE"
                exit 1
            fi

            echo "!! Add UUID-based entry to /etc/fstab for robust mounting across reboots"
            VOLUME_UUID=$(blkid -s UUID -o value "$REAL_DEVICE")
            if [ -z "$VOLUME_UUID" ]; then
                echo "Error: Could not retrieve UUID for $REAL_DEVICE"
                exit 1
            fi
            echo "Volume UUID: $VOLUME_UUID"

            # Remove any existing /mnt/persist entry to avoid duplicates
            sed -i '/[[:space:]]\/mnt\/persist[[:space:]]/d' /etc/fstab

            # Add new UUID-based entry
            echo "UUID=$VOLUME_UUID /mnt/persist ext4 defaults,nofail 0 2" >> /etc/fstab

            echo "!! Clone and use AWS-Games"
            yum install -q -y git
            cd /home/ec2-user
            git clone https://github.com/TSheahan/AWS-Games.git
            chown -R ec2-user:ec2-user AWS-Games
            chmod +x AWS-Games/ec2/minecraft/setup.sh AWS-Games/ec2/update-release.sh  # Ensure executability post-clone
            cd AWS-Games

            echo "!! Write game port range to JSON for future scripts"
            cat <<EOF > /home/ec2-user/game-ports.json
            {
              "start": ${ServerPortNumberStart},
              "end": ${ServerPortNumberEnd}
            }
            EOF
            chown ec2-user:ec2-user /home/ec2-user/game-ports.json

            echo "!! Copy update-release script for ec2-user"
            cp ec2/update-release.sh /home/ec2-user/update-release.sh
            chown ec2-user:ec2-user /home/ec2-user/update-release.sh
            chmod +x /home/ec2-user/update-release.sh

            echo "!! Execute SetupCommand"
            # as root, invoke the setup command, expecting it to handle system & user setup tasks
            # use due caution for code execution capability
            ${SetupCommand}
          - TargetVolumeId: !If [CreateNewVolume, !Ref NewVolume, !Ref ExistingVolumeId]

  NewVolume:
    Type: AWS::EC2::Volume
    Condition: CreateNewVolume
    Properties:
      Size: 10  # Adjust as needed for world files - 1.13GB after 1 months minecraft play
      VolumeType: gp3
      AvailabilityZone: !If  # duplicated AZ choice - reading it from instance would create a dependency loop.
        - HasAvailabilityZone
        - !Ref AvailabilityZone
        - !Select
          - 0
          - !GetAZs
            Ref: AWS::Region
      Tags:
        - Key: "Purpose"
          Value: "GameServerPersistentFiles"
    DeletionPolicy: Retain

  PersistentVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref ServerInstance
      VolumeId: !If [CreateNewVolume, !Ref NewVolume, !Ref ExistingVolumeId]
      Device: /dev/sdf

  ServerEIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref ServerInstance

  ServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and game traffic
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: !Ref ServerPortNumberStart  # Destination port range start
          ToPort: !Ref ServerPortNumberEnd      # Destination port range end
          CidrIp: 0.0.0.0/0

Outputs:
  ServerIP:
    Description: IP Address of the server
    Value: !Ref ServerEIP
  ServerPortStart:
    Description: First TCP port used for the server
    Value: !Ref ServerPortNumberStart
  ServerPortEnd:
    Description: Last TCP port used for the server
    Value: !Ref ServerPortNumberEnd
  SetupCommand:
    Description: Displays the SetupCommand which was used at instance instantiation
    Value: !Ref SetupCommand
  NewVolumeId:
    Description: The ID of the newly created EBS volume (if created).
    Value: !If [ CreateNewVolume, !Ref NewVolume, "" ]
  ExistingVolumeId:
    Description: Mirrors the input for optional existing EBS volume ID.
    Value: !Ref ExistingVolumeId
